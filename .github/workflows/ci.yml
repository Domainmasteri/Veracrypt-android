name: Android CI

on:
  push:
    branches: [ "main", "feat/**", "fix/**" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download VeraCrypt test container
        run: |
          # The test container (AES-256-XTS, PBKDF2-HMAC-SHA512, password "test") is
          # committed at core-native/src/androidTest/assets/test.vc.  We re-download it
          # here from the raw GitHub URL so that the asset is guaranteed to be present
          # even if the local checkout omits large-file assets in the future.
          DEST=core-native/src/androidTest/assets/test.vc
          EXPECTED_SHA256=b71651db848746d13e2b64c2f6d628b34ab74ca7f723006ef380a5e02212687a
          mkdir -p "$(dirname "$DEST")"
          if [ ! -f "$DEST" ]; then
            wget -q -O "$DEST" \
              "https://raw.githubusercontent.com/${{ github.repository }}/HEAD/core-native/src/androidTest/assets/test.vc"
          fi
          echo "$EXPECTED_SHA256  $DEST" | sha256sum -c -

      - name: Build debug APK (includes NDK/JNI compilation)
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :core-api:test :app:testDebugUnitTest --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: veracrypt-android-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  instrumented-tests:
    name: Instrumented tests (AES-XTS header parsing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download VeraCrypt test container
        run: |
          DEST=core-native/src/androidTest/assets/test.vc
          EXPECTED_SHA256=b71651db848746d13e2b64c2f6d628b34ab74ca7f723006ef380a5e02212687a
          mkdir -p "$(dirname "$DEST")"
          if [ ! -f "$DEST" ]; then
            wget -q -O "$DEST" \
              "https://raw.githubusercontent.com/${{ github.repository }}/HEAD/core-native/src/androidTest/assets/test.vc"
          fi
          echo "$EXPECTED_SHA256  $DEST" | sha256sum -c -

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew :core-native:connectedAndroidTest --stacktrace

  release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore from GitHub Secrets
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "Signing secrets are missing. Skipping release build."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        if: env.KEYSTORE_PATH != ''
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload release APK
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: veracrypt-android-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
